@if (evaCustomContent()) {
<ng-content />
} @else {
<div class="eva-error-overlay-content">
	<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="var(--eva-error-overlay-icon-color, rgba(255, 255, 255, 0.9))"
		class="eva-error-overlay-icon">
		<path d="M13,13H11V7H13M13,17H11V15H13M12,2A10,10 0 0,0 2,12A10,10 0 0,0 12,22A10,10 0 0,0 22,12A10,10 0 0,0 12,2Z" />
	</svg>
	<p class="eva-error-overlay-message">{{ evaErrorText() }}</p>
	<button class="eva-error-overlay-retry"
		type="button"
		[attr.aria-label]="evaAria().retryAriaLabel"
		(click)="onRetry()">
		{{ evaRetryText() }}
	</button>
</div>
}
