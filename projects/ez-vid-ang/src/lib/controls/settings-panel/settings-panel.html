<div class="eva-settings-panel-button">
  <span class="eva-settings-panel-icon">
    @if (evaCustomIcon()) {
      <ng-content />
    } @else {
      <eva-icon name="settings" />
    }
  </span>
</div>

<div #dropdown class="eva-settings-panel-dropdown" [class.show]="isOpen()">
	<div #panelContent class="eva-settings-panel-content">
		@if (isInSubMenu()) {
		<!-- Sub-menu view -->
		<div class="eva-settings-panel-header">
			<button type="button" class="eva-settings-panel-back" aria-label="Back"
				(click)="goBack(); $event.stopPropagation()"
				(keydown.enter)="goBack(); $event.stopPropagation()"
				(keydown.space)="goBack(); $event.stopPropagation()">
				<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
					stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
					<polyline points="15 18 9 12 15 6" />
				</svg>
			</button>
			<span class="eva-settings-panel-header-title">{{ activeSubMenu()?.label }}</span>
		</div>
		<div class="eva-settings-panel-options" role="listbox">
			@for (option of activeSubMenu()?.options; track option.id) {
			<button type="button" class="eva-settings-panel-option" role="option"
				[class.selected]="option.selected"
				[class.focused]="isOptionFocused($index)"
				[attr.aria-selected]="option.selected"
				(click)="onOptionClick(option); $event.stopPropagation()"
				(keydown)="onOptionKeyDown($event, option)">
				<span class="eva-settings-panel-option-check">
					<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
						stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
						<polyline points="20 6 9 17 4 12" />
					</svg>
				</span>
				<span class="eva-settings-panel-option-label">{{ option.label }}</span>
			</button>
			}
		</div>
		} @else {
		<!-- Main menu view -->
		<div class="eva-settings-panel-header">
			<span class="eva-settings-panel-header-title">{{ evaSettingsPanelTitle() }}</span>
		</div>
		<div class="eva-settings-panel-items" role="menu">
			@for (item of evaSettingsMenuItems(); track item.id) {
			<button type="button" class="eva-settings-panel-item" role="menuitem"
				[class.disabled]="item.disabled"
				[class.focused]="isMainItemFocused($index)"
				[attr.aria-disabled]="item.disabled || null"
				(click)="onMainItemClick(item); $event.stopPropagation()"
				(keydown)="onMainItemKeyDown($event, item)">
				<span class="eva-settings-panel-item-label">{{ item.label }}</span>
				<span class="eva-settings-panel-item-right">
					@if (item.currentValue) {
					<span class="eva-settings-panel-item-value">{{ item.currentValue }}</span>
					}
					@if (item.options?.length) {
					<span class="eva-settings-panel-item-arrow">
						<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
							stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
							<polyline points="9 18 15 12 9 6" />
						</svg>
					</span>
					}
				</span>
			</button>
			}
		</div>
		}
	</div>
</div>
