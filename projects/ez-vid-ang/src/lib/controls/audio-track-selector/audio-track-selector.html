<div class="eva-audio-track-selector-container">
	<!-- Current Track Display Button -->
	<div class="eva-audio-track-selector-button">
		<span class="track-icon">
			<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
				stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
				<path d="M3 18v-6a9 9 0 0 1 18 0v6" />
				<path d="M21 19a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3zM3 19a2 2 0 0 0 2 2h1a2 2 0 0 0 2-2v-3a2 2 0 0 0-2-2H3z" />
			</svg>
		</span>
		<span class="track-label">{{ currentTrackLabel() }}</span>
		<span class="dropdown-arrow" [class.rotated]="isOpen()">
			<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
				stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
				<polyline points="6 9 12 15 18 9" />
			</svg>
		</span>
	</div>

	<!-- Dropdown Menu -->
	<div class="eva-audio-track-selector-dropdown" [class.show]="isOpen()">
		<div class="dropdown-content">
			<div class="dropdown-header">{{ evaAudioTrackSelectorText() }}</div>
			<div class="track-options">
				@for (track of tracks(); track track.id) {
				<button type="button" class="track-option" role="option"
					[class.active]="track.id === evaAPI.currentAudioTrackId()"
					[attr.aria-selected]="track.id === evaAPI.currentAudioTrackId()"
					(click)="selectTrack(track, $index, $event)">
					<span class="track-text">{{ track.label }}</span>
					@if (track.language) {
					<span class="track-lang">{{ track.language | uppercase }}</span>
					}
					@if (track.id === evaAPI.currentAudioTrackId()) {
					<span class="checkmark">
						<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
							stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
							<polyline points="20 6 9 17 4 12" />
						</svg>
					</span>
					}
				</button>
				}
			</div>
		</div>
	</div>
</div>
