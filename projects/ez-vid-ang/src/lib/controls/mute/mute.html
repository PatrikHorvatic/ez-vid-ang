@if (evaCustomIcon()) {
@if (evaIconVolumeOff()) { <ng-content select="[evaVolumeOff]" /> }
@if (evaIconVolumeLow()) { <ng-content select="[evaVolumeLow]" /> }
@if (evaIconVolumeMiddle()) { <ng-content select="[evaVolumeMiddle]" /> }
@if (evaIconVolumeUp()) { <ng-content select="[evaVolumeUp]" /> }
} @else {
@if (evaIconVolumeOff()) { <eva-icon name="volume-mute" /> }
@if (evaIconVolumeLow()) { <eva-icon name="volume-low" /> }
@if (evaIconVolumeMiddle()) { <eva-icon name="volume-medium" /> }
@if (evaIconVolumeUp()) { <eva-icon name="volume-high" /> }
}
